# Nginx configuration for Atlas Somático Editorial
# Optimized for performance, security, and accessibility

server {
    listen 80;
    server_name atlas-somatico.com www.atlas-somatico.com;
    
    # Redirect HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name atlas-somatico.com www.atlas-somatico.com;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/atlas-somatico.com.crt;
    ssl_certificate_key /etc/ssl/private/atlas-somatico.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.atlas-somatico.com https://www.google-analytics.com; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; upgrade-insecure-requests;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Root directory
    root /var/www/atlas-somatico;
    index index.html;
    
    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private must-revalidate auth;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        image/svg+xml;
    
    # Enable Brotli compression (if available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
        
        # CORS for fonts
        location ~* \.(woff|woff2|ttf|eot)$ {
            add_header Access-Control-Allow-Origin "*";
        }
    }
    
    # Cache HTML files with shorter duration
    location ~* \.(html)$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Handle assets-atlas directory
    location /assets-atlas/ {
        alias /var/www/atlas-somatico/assets-atlas/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        
        # Security for sensitive files
        location ~* \.(php|jsp|asp|aspx|cgi|pl|py)$ {
            deny all;
        }
    }
    
    # Handle templates-atlas directory
    location /templates-atlas/ {
        alias /var/www/atlas-somatico/templates-atlas/;
        
        # Don't cache templates (they may change frequently)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Handle API requests (proxy to backend)
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API timeout settings
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Cache API responses (short duration)
        proxy_cache_valid 200 5m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
    }
    
    # Handle main application routes
    location / {
        try_files $uri $uri/ /templates-atlas/comprehensive-experience.html;
        
        # Security for hidden files
        location ~ /\. {
            deny all;
        }
        
        # Block access to sensitive files
        location ~* \.(conf|log|sql|bak|backup|old)$ {
            deny all;
        }
    }
    
    # Specific routing for single-page application
    location ~ ^/(scrollytelling|body-maps|data-viz|progress|search)/?$ {
        rewrite ^.*$ /templates-atlas/comprehensive-experience.html last;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Robots.txt
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
    
    # Sitemap.xml
    location = /sitemap.xml {
        access_log off;
        log_not_found off;
    }
    
    # Favicon
    location = /favicon.ico {
        access_log off;
        log_not_found off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Security: Block suspicious user agents
    if ($http_user_agent ~* (bot|crawl|spider|scraper)) {
        return 403;
    }
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=search:10m rate=5r/s;
    
    location /api/ {
        limit_req zone=api burst=20 nodelay;
    }
    
    location /search {
        limit_req zone=search burst=10 nodelay;
    }
    
    # Logging
    access_log /var/log/nginx/atlas-somatico_access.log;
    error_log /var/log/nginx/atlas-somatico_error.log;
    
    # Error pages
    error_page 404 /templates-atlas/404.html;
    error_page 500 502 503 504 /templates-atlas/50x.html;
    
    # Custom error pages with security headers
    location = /templates-atlas/404.html {
        internal;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
    }
    
    location = /templates-atlas/50x.html {
        internal;
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options SAMEORIGIN;
    }
}

# Configuration for staging environment
server {
    listen 80;
    server_name staging.atlas-somatico.com;
    
    root /var/www/atlas-somatico-staging;
    index index.html;
    
    # Basic staging configuration without HTTPS
    location / {
        try_files $uri $uri/ /templates-atlas/comprehensive-experience.html;
    }
    
    location /assets-atlas/ {
        alias /var/www/atlas-somatico-staging/assets-atlas/;
        expires 1h;
        add_header Cache-Control "public";
    }
    
    location /templates-atlas/ {
        alias /var/www/atlas-somatico-staging/templates-atlas/;
        add_header Cache-Control "no-cache";
    }
    
    # Staging API proxy
    location /api/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    access_log /var/log/nginx/atlas-somatico_staging_access.log;
    error_log /var/log/nginx/atlas-somatico_staging_error.log;
}
