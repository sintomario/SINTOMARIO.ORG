<!-- 
simple.html: Template for static pages (About, FAQ, Legal, etc.)

Extends: base.html
Context variables:
  - page_title: Page title
  - page_description: Page description
  - page_url: Full URL to page
  - heading: Page heading
  - content: Main content HTML
  - sidebar_content: Optional sidebar content (optional)
-->

{% extends "base.html" %}

{% block content %}
<main class="wrap">
  <!-- Hero/Page Header -->
  <section class="hero simple-hero">
    <h1 class="page-heading">{{ heading | escape }}</h1>
    {% if page_description %}
    <p class="page-subtitle">{{ page_description }}</p>
    {% endif %}
  </section>

  <!-- Two-column layout for pages with sidebar -->
  {% if sidebar_content %}
  <div class="page-layout">
    <!-- Main Content -->
    <article class="page-content">
      {{ content | safe }}
    </article>

    <!-- Sidebar -->
    <aside class="page-sidebar">
      {{ sidebar_content | safe }}
    </aside>
  </div>
  
  <!-- Single column layout for simple pages -->
  {% else %}
  <article class="page-content page-content--full">
    {{ content | safe }}
  </article>
  {% endif %}
</main>
{% endblock %}
