<!DOCTYPE html>
<html lang="es" data-theme="night">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 | Página No Encontrada — SINTOMARIO.ORG</title>
  <meta name="description" content="La página que buscas no existe en nuestro atlas psicosomático.">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Inter:wght@300;400;500;600&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --deep: #2a0115; --mid: #670433; --authority: #F5C400; }
    html, body {
      height: 100%;
      background: var(--deep);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    #bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 22px;
      background: #F5C400;
      color: #1a0000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      z-index: 200;
    }
    h1 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(80px, 20vw, 160px);
      font-weight: 400;
      color: var(--authority);
      line-height: 1;
      margin-bottom: 16px;
    }
    h2 {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 400;
      font-style: italic;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 24px;
      opacity: 0.9;
    }
    p {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      max-width: 400px;
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      padding: 12px 28px;
      background: var(--mid);
      color: #fff;
      text-decoration: none;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.2);
      transition: all 0.2s;
    }
    .btn:hover {
      background: #8c0548;
      border-color: var(--authority);
    }
    .links {
      margin-top: 48px;
      display: flex;
      gap: 24px;
    }
    .links a {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .links a:hover { color: var(--authority); }
  </style>
</head>
<body>
  <div id="bar">⚠ Sitio informativo. No reemplaza diagnóstico médico profesional.</div>
  
  <h1>404</h1>
  <h2>Página No Encontrada</h2>
  <p>El síntoma o la condición que buscas no está indexada en nuestro atlas psicosomático. Quizás aún no hemos cartografiado esta zona del cuerpo-emoción.</p>
  
  <a href="/CLICKER" class="btn">Volver al Atlas</a>
  
  <div class="links">
    <a href="/">Inicio</a>
    <a href="/faq">FAQ</a>
    <a href="/sobre">Sobre</a>
  </div>
</body>
</html>
