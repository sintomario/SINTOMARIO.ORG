<!doctype html><html lang='es'><head><meta charset='utf-8'><meta name='robots' content='noindex,nofollow'><style>
body{margin:0;background:#0a0a0a;color:#efe8d8;font-family:Georgia,serif;line-height:1.76}
.wrap{max-width:980px;margin:0 auto;padding:24px}
.hero,.card{background:#171717;border:1px solid #353024;border-radius:18px;padding:24px}
.hero{background:linear-gradient(180deg,#171717,#111)}
.eyebrow,.badge{font:600 12px/1.4 "DM Mono",monospace;letter-spacing:.08em;text-transform:uppercase;color:#c9a961}
h1,h2,h3{line-height:1.16}
h1{font-size:clamp(2.4rem,6vw,4.1rem);margin:.2em 0}
h2{font-size:1.65rem;margin-top:2rem;color:#f6eedf}
h3{font-size:1.1rem;margin-top:1.2rem;color:#e7d8b4}
p,li{color:#d8d0be}
a{color:#d6ba7c}
.grid{display:grid;gap:16px}
.products{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.product{background:#111;border:1px solid #2d2d2d;border-radius:14px;padding:16px}
.muted{color:#b7ae9a}
.toc{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0 0}
.toc span{padding:6px 10px;border:1px solid #3f3a2c;border-radius:999px;color:#c9a961;font-size:.78rem}
</style><title>Admin | SINTOMARIO</title></head><body><main class='wrap'><section class='hero'><h1>Admin local</h1><p>Panel reservado para uso local y verificacion previa al push.</p></section></main></body></html>
