# .github/workflows/generate.yml
# Cron L/M/V 09:00 UTC — genera 3 lecturas + importa + score + deploy + indexnow
name: Generate readings

on:
  schedule:
    - cron: '0 9 * * 1,3,5'
  workflow_dispatch:  # Permite ejecutar manualmente

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate new readings
        run: python3 scripts/sabia_v2.py --count 3 --format json --output ./content/readings
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Import to Postgres
        run: npx tsx scripts/import-readings.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Update scores
        run: npx tsx scripts/score-readings.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Commit generated content
        run: |
          git config user.name "SABIA Bot"
          git config user.email "bot@sabia.info"
          git add content/readings/
          git diff --cached --quiet || git commit -m "auto: generate new readings $(date +%Y-%m-%d)"
          git push

      - name: Trigger Vercel deploy
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"

      - name: Submit URLs to IndexNow
        run: npx tsx scripts/indexnow-submit.ts
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SITE_URL: https://sabia.info
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
