<!DOCTYPE html>
<html lang="es" data-theme="night">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Atlas Corporal | SINTOMARIO.ORG</title>
  <meta name="description" content="Atlas psicosomático interactivo. Explora la conexión entre síntomas físicos y estados emocionales.">
  
  <!-- Equipo D: Tailwind & Fonts Integration -->
  
  
  

  

  <style>
    /* Equipo E: Higiene y Performance */
    :root {
      --bar-h: 22px;
      --head-h: 56px;
      --foot-h: 36px;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: conic-gradient(from 200deg at 50% 55%, #1a010c, #670433, #8c0548, #770839, #4d0228, #1a010c);
      height: 100vh;
      overflow: hidden;
    }
    .font-headline { font-family: Georgia, "Times New Roman", serif; }
    .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; }
    
    .disclaimer-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 22px;
      background: #F5C400;
      color: #1a0000;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(8px, 0.8vw, 12px);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 700;
      z-index: 9999;
    }
    
    .nav-link { font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase; opacity: 0.8; transition: all 0.2s; }
    .nav-link:hover { opacity: 1; color: #F5C400; }
    .main-content { height: calc(100vh - var(--bar-h) - var(--head-h) - var(--foot-h)); }
    
    .wbtn {
      padding: 8px 16px;
      background: rgba(0,0,0,0.55);
      border-left: 2px solid rgba(255,255,255,0.25);
      color: rgba(255,255,255,0.85);
      font-size: 13px;
      line-height: 1.4;
      transition: all 0.2s;
      text-align: left;
      cursor: pointer;
      min-height: 36px;
      display: flex;
      align-items: center;
    }
    .wbtn:hover { background: rgba(255,255,255,0.1); color: #fff; border-left-color: #F5C400; }
    .wbtn.hub { font-weight: 600; border-left-color: #d0bcff; margin-top: 10px; font-size: 14px; }
    
    .scroll-hint { font-size: 11px; letter-spacing: 0.18em; color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.6); padding: 4px 12px; border-radius: 4px; text-transform: uppercase; animation: pulse 2.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 0.2 } 50% { opacity: 0.6 } }
    
    #color-overlay { position: absolute; inset: 0; z-index: 50; pointer-events: none; background: conic-gradient(from 200deg at 50% 55%, #1a010c, #670433, #8c0548, #770839, #4d0228, #1a010c); mix-blend-mode: color; opacity: 0.55; }
    #stack img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: contain; pointer-events: none; transition: opacity 0.9s ease; }
  
    /* ── NATIVE HEADER CSS ── */
    #header { position: fixed; top: var(--bar-h, 18px); left: 0; right: 0; height: var(--head-h, 64px); background: #2a0115; border-bottom: 1px solid rgba(255, 255, 255, 0.07); display: flex; align-items: center; justify-content: space-between; padding: 0 14px; z-index: 9998; }
    #logo { font-family: Georgia, "Times New Roman", serif; font-size: clamp(18px, 4vw, 26px); font-weight: 700; letter-spacing: 0.04em; color: #fff; white-space: nowrap; line-height: 1; }
    #logo img { height: clamp(24px, 3.5vw, 32px); object-fit: contain; }
    #searchbox { display: flex; align-items: center; gap: 5px; border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 3px; padding: 3px 8px; background: #670433; margin-right: 12px; }
    #searchbox input { background: none; border: none; outline: none; color: #fff; font-size: clamp(8px, 1.2vw, 10px); width: clamp(60px, 10vw, 100px); }
    #searchbox input::placeholder { color: rgba(255, 255, 255, 0.5); }
    #nav-container { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; padding: 4px 0; }
    .nav-row { display: flex; align-items: center; gap: clamp(8px, 1.5vw, 16px); justify-content: flex-end; width: 100%; }
    .nav-row a { font-size: clamp(7px, 1.2vw, 9px); font-weight: 400; letter-spacing: 0.14em; color: #fff; text-decoration: none; text-transform: uppercase; opacity: 0.7; transition: opacity 0.2s; white-space: nowrap; }
    .nav-row a:hover { opacity: 1; }
    #btn-clk { background: #5a1035; color: #fff; border: none; padding: 4px clamp(8px, 1.5vw, 11px); font-size: clamp(7px, 1.2vw, 9px); font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; border-radius: 2px; cursor: pointer; transition: background 0.2s; white-space: nowrap; }
    #btn-clk:hover { background: #8c0548; }
    #lang-select { background: #670433; color: #fff; border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 3px; padding: 4px 8px; font-size: 10px; cursor: pointer; outline: none; }
    #lang-select option { background: #2a0115; color: #fff; }
    @media (max-width: 640px) {
      #header { padding: 0 8px; gap: 8px; }
      #logo { flex-shrink: 0; }
      #logo img { height: 22px; }
      #nav-container { gap: 4px; }
      .nav-row { gap: 8px; justify-content: flex-end; overflow-x: auto; scrollbar-width: none; }
      .nav-row::-webkit-scrollbar { display: none; }
      .nav-row.bottom-row a[href="/sobre"], .nav-row.bottom-row a[href="/faq"] { display: none; }
      #searchbox { padding: 2px 6px; margin-right: 0; }
      #searchbox input { width: 70px; }
    }
  </style>
</head>
<body class="text-white overflow-hidden">

  <!-- Disclaimer -->
  <div class="disclaimer-bar">⚠ Disclaimer — Sitio informativo. No reemplaza diagnóstico médico profesional.</div>

  <!-- Navigation -->
      <header id="header">
    <a href="/" id="logo">
      <img src="/LOGO-HORIZONTAL-02.png" alt="SINTOMARIO.ORG">
    </a>
    <div id="nav-container">
      <div class="nav-row top-row">
        <div id="searchbox">
          <span style="font-size:12px;opacity:0.75;padding-bottom:1px;font-family: system-ui, sans-serif;">🔍</span>
          <input type="text" placeholder="Buscar síntoma..." id="q" onkeypress="if(event.key==='Enter') window.location.href='/search?q='+this.value">
        </div>
        <button id="btn-clk" onclick="window.open('https://ko-fi.com/sintomario', '_blank')">AYUDA</button>
      </div>
      <div class="nav-row bottom-row">
        <a href="/sobre/index.html">Sobre</a>
        <a href="/cuerpo/index.html" style="color:#F5C400">Atlas</a>
        <a href="/faq/index.html">FAQ</a>
        <div id="lang-selector">
          <select id="lang-select" onchange="changeLanguage(this.value)">
            <option value="es" selected>ES</option>
            <option value="en">EN</option>
            <option value="pt">PT</option>
          </select>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Explorer -->
  <main class="main-content mt-[78px] relative overflow-hidden">
    <div class="w-full h-full relative touch-none focus:outline-none" id="screen" tabindex="0">
      
      <!-- Dynamic System Title -->
      <div class="system-title font-headline italic uppercase absolute bottom-4 w-full text-center z-30 pointer-events-none text-2xl tracking-[0.1em] drop-shadow-lg" id="sys-title">
        SISTEMA MUSCULAR
      </div>
      
      <!-- Scroll Hint -->
      <div class="scroll-hint absolute bottom-20 left-1/2 -translate-x-1/2 z-50 whitespace-nowrap" id="hint">
        ↕ scroll para explorar
      </div>
      
      <!-- Word Buttons Container -->
      <div class="absolute left-6 bottom-12 z-40 flex flex-col gap-1 items-start" id="words">
        <!-- Populated by JS -->
      </div>

      <!-- Image Stack -->
      <div class="absolute inset-0 z-10" id="stack">
        <img src="/layers/PNG/01_LUZ.png" data-fixed="luz" data-id="luz" alt="Capa de iluminación" style="z-index: 100; mix-blend-mode: darken; opacity: 0.84;">
        <img src="/layers/PNG/04_TRIPAS.png" data-sys="DIGESTIVO" data-id="digestivo" alt="Sistema digestivo" style="z-index: 8; mix-blend-mode: hard-light; opacity: 0.85;">
        <img src="/layers/PNG/05_MENTE.png" data-sys="PSÍQUICO" data-id="psiquico" alt="Sistema psíquico" style="z-index: 7; mix-blend-mode: darken; opacity: 0.85;">
        <img src="/layers/PNG/03_EMOTION.png" data-sys="EMOCIONAL" data-id="emocional" alt="Sistema emocional" style="z-index: 6; mix-blend-mode: darken; opacity: 1.0;">
        <img src="/layers/PNG/07_CARDIOVASCULAR.png" data-sys="CIRCULATORIO" data-id="circulatorio" alt="Sistema circulatorio" style="z-index: 5; mix-blend-mode: darken; opacity: 0.85;">
        <img src="/layers/PNG/09_NERVIOS.png" data-sys="NERVIOSO" data-id="nervioso" alt="Sistema nervioso" style="z-index: 4; mix-blend-mode: hard-light; opacity: 0.82;">
        <img src="/layers/PNG/02_PIEL.png" data-sys="PERCEPTUAL" data-id="perceptual" alt="Sistema perceptual" style="z-index: 3; mix-blend-mode: hard-light; opacity: 1.0;">
        <img src="/layers/PNG/06_MUSCULOS.png" data-sys="MUSCULAR" data-id="muscular" alt="Sistema muscular" style="z-index: 2; mix-blend-mode: luminosity; opacity: 1.0;">
        <img src="/layers/PNG/11_MATERNO.png" data-sys="MATERNO" data-id="materno" alt="Sistema materno" style="z-index: 1; mix-blend-mode: soft-light; opacity: 0.9;">
        <img src="/layers/PNG/08_OSEO.png" data-sys="ÓSEO" data-id="oseo" alt="Sistema óseo" style="z-index: 0; mix-blend-mode: multiply; opacity: 1.0;">
        <img src="/layers/PNG/10_BASE.png" data-fixed="base" data-id="base" alt="Capa base anatómica" style="z-index: 0; mix-blend-mode: luminosity; opacity: 1.0;">
      </div>
      
      <!-- Color Equalization Overlay -->
      <div id="color-overlay"></div>
    </div>
    <div style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:80;background:rgba(0,0,0,0.6);padding:8px 16px;border-radius:20px;font-size:11px;letter-spacing:0.05em;">
      <a href="/cuerpo/atlas-nav.html" style="color:#F5C400;text-decoration:none;">→ Ver Índice de Sistemas</a>
    </div>
  </main>

  <!-- Footer -->
  <footer class="fixed bottom-0 w-full h-[36px] bg-plum-deep/90 border-t border-white/5 flex items-center justify-between px-6 z-[9997]">
    <div class="text-[13px] text-white/60 tracking-wide flex items-center">
      &copy;2026 — <strong class="text-white/80" id="visits">0</strong> visitas
      ©2026 — <strong class="text-white/80" id="visits">0</strong> visitas
    </div>
    <div class="flex gap-4">
      <a href="#" class="nav-link text-[12px]">Privacidad</a>
      <a href="#" class="nav-link text-[12px]">Términos</a>
    </div>
  </footer>

  <script>
    const WORDS = {
      "NERVIOSO": [
        { t: "Cerebro", s: "cerebro-ansiedad" },
        { t: "Ojos", s: "ojos-negacion" },
        { t: "Oídos", s: "oidos-no-escuchar" },
        { t: "N. Vago", s: "nervios-estres" },
        { t: "Migraña", s: "cabeza-migrana" },
        { t: "Insomnio", s: "insomnio-control" },
        { t: "Vértigo", s: "vertigo-incertidumbre" }
      ],
      "ÓSEO": [
        { t: "Columna", s: "columna-abandono" },
        { t: "Rodilla", s: "rodilla-conflicto" },
        { t: "Cadera", s: "cadera-miedo" },
        { t: "Cervicales", s: "cervicales-rigidez" },
        { t: "Mandíbula", s: "mandibula-tension" },
        { t: "Huesos", s: "oseo-identidad" },
        { t: "Dientes", s: "dientes-decision" }
      ],
      "CIRCULATORIO": [
        { t: "Corazón", s: "corazon-tristeza" },
        { t: "Pulmones", s: "pulmones-ahogo" },
        { t: "Pecho", s: "pecho-ansiedad" },
        { t: "Presión", s: "presion-control" },
        { t: "Taquicardia", s: "corazon-panico" },
        { t: "Circulación", s: "circulacion-miedo" },
        { t: "Anemia", s: "sangre-agotamiento" }
      ],
      "MUSCULAR": [
        { t: "Hombros", s: "hombro-responsabilidad" },
        { t: "Cuello", s: "cuello-estres" },
        { t: "Lumbar", s: "lumbar-miedo" },
        { t: "Mandíbula", s: "mandibula-rabia" },
        { t: "Trapecio", s: "trapecio-carga" },
        { t: "Fibromialgia", s: "musculos-trauma" },
        { t: "Contractura", s: "musculos-resistencia" }
      ],
      "PSÍQUICO": [
        { t: "Bucle", s: "mente-obsesion" },
        { t: "Niebla", s: "mente-confusion" },
        { t: "Ansiedad", s: "mente-ansiedad" },
        { t: "Fobias", s: "mente-fobia" },
        { t: "TOC", s: "mente-toc" },
        { t: "Burnout", s: "cerebro-burnout" },
        { t: "Disociación", s: "mente-disociacion" }
      ],
      "DIGESTIVO": [
        { t: "Estómago", s: "estomago-rabia" },
        { t: "Colón", s: "colon-injusticia" },
        { t: "Hígado", s: "higado-ira" },
        { t: "Reflujo", s: "reflujo-represion" },
        { t: "Intestino", s: "intestino-soltar" },
        { t: "Gastritis", s: "gastritis-autoexigencia" },
        { t: "Boca", s: "boca-expresion" }
      ],
      "EMOCIONAL": [
        { t: "Llanto", s: "llanto-liberacion" },
        { t: "Vacío", s: "vacio-abandono" },
        { t: "Culpa", s: "culpa-castigo" },
        { t: "Vergüenza", s: "verguenza-exposicion" },
        { t: "Apatía", s: "apatia-desconexion" },
        { t: "Soledad", s: "soledad-rechazo" },
        { t: "Garganta", s: "garganta-represion" }
      ],
      "PERCEPTUAL": [
        { t: "Dermatitis", s: "dermatitis-limites" },
        { t: "Acné", s: "acne-autoestima" },
        { t: "Urticaria", s: "piel-rabia" },
        { t: "Psoriasis", s: "psoriasis-proteccion" },
        { t: "Nariz", s: "nariz-intuicion" },
        { t: "Sudoración", s: "sudoracion-miedo" },
        { t: "Herpes", s: "herpes-conflicto" }
      ],
      "MATERNO": [
        { t: "Embarazo", s: "fertilidad-concepcion" },
        { t: "Fertilidad", s: "fertilidad-creacion" },
        { t: "Menstruación", s: "menstruacion-ciclo" },
        { t: "Ovarios", s: "ovarios-femenidad" },
        { t: "Útero", s: "area-reproductiva-gestacion" },
        { t: "Lactancia", s: "pecho-nutricion" },
        { t: "Hormonas", s: "hormonas-transformacion" }
      ]
    };

    const stackEl = document.getElementById("stack");
    const titleEl = document.getElementById("sys-title");
    const wordsEl = document.getElementById("words");
    const screenEl = document.getElementById("screen");
    const hintEl = document.getElementById("hint");

    const allImgs = Array.from(stackEl.querySelectorAll("img"));
    let layers = allImgs.map(img => ({
      img,
      id: img.dataset.id,
      sys: img.dataset.sys,
      fixed: img.dataset.fixed
    }));

    const getSysLayers = () => layers.filter(l => l.sys);

    function render() {
      const sysLayers = getSysLayers();
      const active = sysLayers[0];
      if (!active) return;
      
      const sys = active.sys;
      titleEl.textContent = "SISTEMA " + sys;
      
      wordsEl.innerHTML = "";
      (WORDS[sys] || []).forEach(w => {
        const b = document.createElement("button");
        b.className = "wbtn font-body";
        b.textContent = w.t;
        // Equipo E: Ruta corregida de /atlas/ a /cuerpo/
        b.onclick = () => { window.location.href = "/cuerpo/" + w.s + "/index.html"; }; 
        wordsEl.appendChild(b);
      });
      
      const hub = document.createElement("button");
      hub.className = "wbtn hub font-body";
      hub.textContent = "→ SINTOMARIO";
      hub.onclick = () => {
        const slug = active.id.replace("psiquico", "mente").replace("oseo", "huesos");
        window.location.href = `/cuerpo/${slug}/index.html`; // Equipo E: Apuntar a index.html
      };
      wordsEl.appendChild(hub);
    }

    function scrollSys(dir) {
      const sysLayers = getSysLayers();
      if (sysLayers.length < 2) return;
      
      const first = sysLayers[0];
      const last = sysLayers[sysLayers.length - 1];
      const firstIdx = layers.indexOf(first);
      const lastIdx = layers.indexOf(last);
      
      if (dir > 0) {
        layers.splice(firstIdx, 1);
        layers.splice(lastIdx, 0, first);
      } else {
        layers.splice(lastIdx, 1);
        layers.splice(firstIdx, 0, last);
      }
      
      // Re-apply z-index
      layers.forEach((l, i) => {
        l.img.style.zIndex = l.fixed ? (l.id === 'luz' ? 100 : 0) : (layers.length - i);
      });
      
      hintEl.style.opacity = "0";
      render();
    }

    // Wheel interaction
    let wa = 0;
    screenEl.addEventListener("wheel", e => {
      e.preventDefault();
      wa += e.deltaY;
      if (Math.abs(wa) >= 80) {
        scrollSys(wa > 0 ? 1 : -1);
        wa = 0;
      }
    }, { passive: false });

    // Touch interaction
    let ty = null;
    screenEl.addEventListener("touchstart", e => { ty = e.touches[0].clientY; }, { passive: true });
    screenEl.addEventListener("touchmove", e => {
      if (ty === null) return;
      const dy = e.touches[0].clientY - ty;
      if (Math.abs(dy) >= 60) {
        scrollSys(dy < 0 ? 1 : -1);
        ty = e.touches[0].clientY;
      }
      e.preventDefault();
    }, { passive: false });

    // Keyboard interaction
    screenEl.addEventListener("keydown", e => {
      if (["ArrowDown", "ArrowRight"].includes(e.key)) { e.preventDefault(); scrollSys(1); }
      if (["ArrowUp", "ArrowLeft"].includes(e.key)) { e.preventDefault(); scrollSys(-1); }
    });

    // Global visitor counter - simple backend API
    (function() {
      function updateGlobalCounter() {
        // Increment counter and get updated value
        fetch('/api/counter.php?action=visit')
          .then(response => response.json())
          .then(data => {
            const visitsEl = document.getElementById("visits");
            if (visitsEl) {
              visitsEl.textContent = data.visits.toLocaleString("es-ES");
            }
          })
          .catch(error => {
            console.error('Error updating counter:', error);
            // Fallback: show basic message
            const visitsEl = document.getElementById("visits");
            if (visitsEl) {
              visitsEl.textContent = "Conectando...";
            }
          });
      }
      
      // Update counter immediately when page loads
      updateGlobalCounter();
    })();

    // Language selector function
    function changeLanguage(lang) {
      localStorage.setItem('sintomario-lang', lang);
      
      const currentPath = window.location.pathname;
      let newPath;
      
      if (lang === 'es') {
        // Spanish paths (no prefix)
        if (currentPath.startsWith('/sobre')) {
          newPath = '/sobre';
        } else if (currentPath.startsWith('/cuerpo')) {
          newPath = '/cuerpo';
        } else if (currentPath.startsWith('/faq')) {
          newPath = '/faq';
        } else {
          newPath = '/';
        }
      } else {
        // English/Portuguese paths (with prefix)
        if (currentPath.startsWith('/sobre')) {
          newPath = '/' + lang + '/sobre';
        } else if (currentPath.startsWith('/cuerpo')) {
          newPath = '/' + lang + '/cuerpo';
        } else if (currentPath.startsWith('/faq')) {
          newPath = '/' + lang + '/faq';
        } else {
          newPath = '/' + lang;
        }
      }
      
      window.location.href = newPath;
    }

    // Init
    screenEl.focus();
    render();
  </script>

</body>
</html>
